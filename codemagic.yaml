workflows:
  android-apk-build:
    name: Royal Gym APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20
    scripts:
      - name: Install dependencies
        script: | 
          npm install
      - name: Expo Prebuild
        script: | 
          npx expo prebuild --platform android --clean
      - name: Build Android APK
        script: | 
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - bambambholeyarun@gmail.com
